<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大P 重訓進步追蹤</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #ffffff 0%, #eef2ff 100%);
      border-bottom: 1px solid #d6dce8;
      padding: 24px 32px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #1a202c;
    }

    header p {
      margin-top: 4px;
      font-size: 0.85rem;
      color: #718096;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Stats cards ─────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: #ffffff;
      border: 1px solid #d6dce8;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-card .unit {
      font-size: 0.9rem;
      color: #a0aec0;
      margin-left: 2px;
    }

    /* ── Charts grid ─────────────────────────────────── */
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #d6dce8;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }

    .chart-card {
      background: #ffffff;
      border: 1px solid #d6dce8;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .chart-card .chart-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .chart-card .chart-sub {
      font-size: 0.75rem;
      color: #718096;
      margin-bottom: 16px;
    }

    .chart-card canvas {
      max-height: 220px;
    }

    /* ── Recent sessions table ───────────────────────── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #d6dce8;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      background: #ffffff;
    }

    thead tr {
      background: #f7f9fc;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #718096;
      font-weight: 600;
    }

    tbody tr {
      border-top: 1px solid #e8edf3;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #f7f9fc; }

    td {
      padding: 11px 16px;
      color: #2d3748;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: #4a5568;
      border-top: 1px solid #d6dce8;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>大P 重訓進步追蹤</h1>
  <p>教練：Jerry Sun　｜　起始日：2026/05/11</p>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Charts -->
  <div class="section-title">重量進步折線圖</div>
  <div class="charts-grid" id="charts-grid"></div>

  <!-- Recent log -->
  <div class="section-title">最近訓練紀錄</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>動作</th>
          <th>重量</th>
          <th>組數</th>
          <th>次數</th>
          <th>訓練量</th>
          <th>備注</th>
        </tr>
      </thead>
      <tbody id="log-tbody"></tbody>
    </table>
  </div>

</div>

<footer>最後更新：<span id="last-updated"></span></footer>

<script>
// ════════════════════════════════════════════════════════
// 訓練資料  — 之後貼對話給 Claude，它會產生新的 row 讓你加進來
// 格式：['YYYY-MM-DD', '動作', 重量kg, 組數, 次數, 訓練量kg, '備注']
// ════════════════════════════════════════════════════════
const LOG = [
  ['2026-05-11','高背槓深蹲',   35,   1, 6,  210, '各組只做1下，不完整'],
  ['2026-05-11','槓鈴反式划船',  0,   3, 6,    0, '體重動作'],
  ['2026-05-11','單邊啞鈴臥推',  7.5, 3, 6,  135, ''],
  ['2026-05-11','羅馬椅胸抱槓片',10,  3,10,  300, ''],
  ['2026-05-11','側棒式',         0,  3,20,    0, '秒'],

  ['2026-05-19','相撲硬舉T&G',  40,   1, 6,  240, '有墊，訓練組'],
  ['2026-05-19','跪姿啞鈴肩推',  5,   3, 8,  120, ''],
  ['2026-05-19','滑輪下拉',      20,  3, 8,  480, ''],
  ['2026-05-19','酒杯跨步蹲',   10,   3, 6,  180, '同腳前後各3'],
  ['2026-05-19','肘撐懸吊舉腿',  0,   3,10,    0, '體重動作'],

  ['2026-05-21','高背槓深蹲',   35,   2, 6,  420, '疲勞日，37.5未完成'],
  ['2026-05-21','槓鈴反式划船',  0,   3, 6,    0, '架高一格'],
  ['2026-05-21','單邊啞鈴臥推',  7.5, 3, 6,  135, ''],
  ['2026-05-21','羅馬椅胸抱槓片',10,  3,10,  300, ''],
  ['2026-05-21','側棒式',         0,  3,20,    0, '秒'],

  ['2026-05-24','相撲硬舉T&G',  45,   1, 6,  270, '每組都換重量（不符規定）'],
  ['2026-05-24','跪姿啞鈴肩推',  5,   3, 8,  120, ''],
  ['2026-05-24','滑輪下拉',      20,  3, 8,  480, ''],
  ['2026-05-24','酒杯跨步蹲',   10,   3, 6,  180, ''],
  ['2026-05-24','肘撐懸吊舉腿',  0,   3,10,    0, ''],

  ['2026-05-25','高背槓深蹲',   35,   4, 6,  840, '首次穩定4×6'],
  ['2026-05-25','槓鈴反式划船',  0,   3, 6,    0, ''],
  ['2026-05-25','單邊啞鈴臥推',  7.5, 3, 6,  135, ''],
  ['2026-05-25','羅馬椅胸抱槓片',10,  3,10,  300, ''],
  ['2026-05-25','側棒式',         0,  3,20,    0, '秒'],

  ['2026-05-31','相撲硬舉T&G',  47.5, 2, 6,  570, '45×2+47.5×2'],
  ['2026-05-31','跪姿啞鈴肩推',  7.5, 3, 6,  135, '首次7.5kg'],
  ['2026-05-31','滑輪下拉',      20,  3, 8,  480, ''],
  ['2026-05-31','酒杯跨步蹲',   15,   3, 6,  270, ''],
  ['2026-05-31','肘撐懸吊舉腿',  0,   3,10,    0, ''],

  ['2026-06-01','高背槓深蹲',   37.5, 2, 6,  450, '37.5kg完成2組'],
  ['2026-06-01','槓鈴反式划船',  0,   3, 8,    0, '改8下'],
  ['2026-06-01','單邊啞鈴臥推',  7.5, 3, 8,  180, '改8下'],
  ['2026-06-01','羅馬椅胸抱槓片',10,  3,10,  300, ''],

  ['2026-06-04','相撲硬舉T&G',  47.5, 4, 6, 1140, '首次穩定4×6'],
  ['2026-06-04','跪姿啞鈴肩推',  7.5, 2, 6,   90, ''],
  ['2026-06-04','滑輪下拉',      25,  3, 8,  600, '加重至25kg'],
  ['2026-06-04','酒杯跨步蹲',   15,   3, 6,  270, ''],

  ['2026-06-05','高背槓深蹲',   35,   3, 6,  630, '保守穩定'],
  ['2026-06-05','槓鈴反式划船',  0,   3, 8,    0, ''],
  ['2026-06-05','單邊啞鈴臥推', 10,   2, 6,  120, '進步'],
  ['2026-06-05','羅馬椅胸抱槓片',10,  3,10,  300, '慢速下放'],

  ['2026-06-07','相撲硬舉T&G',  55.5, 4, 6, 1332, '大突破'],
  ['2026-06-07','跪姿啞鈴肩推',  7.5, 3, 6,  135, ''],
  ['2026-06-07','酒杯跨步蹲',   17.5, 3, 6,  315, ''],
  ['2026-06-07','肘撐懸吊舉腿',  0,   3,10,    0, ''],
];

// ════════════════════════════════════════════════════════
// 圖表設定
// ════════════════════════════════════════════════════════
const EXERCISES = [
  { key: '高背槓深蹲',    label: '高背槓深蹲',    color: '#4a86e8' },
  { key: '相撲硬舉T&G',  label: '相撲硬舉 T&G', color: '#e06666' },
  { key: '單邊啞鈴臥推',  label: '單邊啞鈴臥推',  color: '#6aa84f' },
  { key: '跪姿啞鈴肩推',  label: '跪姿啞鈴肩推',  color: '#e69138' },
  { key: '滑輪下拉',      label: '滑輪下拉',      color: '#674ea7' },
  { key: '酒杯跨步蹲',    label: '酒杯跨步蹲',    color: '#cc4125' },
];

// ════════════════════════════════════════════════════════
// 渲染
// ════════════════════════════════════════════════════════
Chart.defaults.color = '#718096';
Chart.defaults.borderColor = '#e2e8f0';

function getExerciseData(key) {
  return LOG
    .filter(r => r[1] === key && r[2] > 0)
    .map(r => ({ x: r[0], y: r[2] }))
    .sort((a, b) => a.x.localeCompare(b.x));
}

function buildChart(canvasId, ex) {
  const pts = getExerciseData(ex.key);
  new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: {
      datasets: [{
        data: pts,
        borderColor: ex.color,
        backgroundColor: ex.color + '22',
        pointBackgroundColor: ex.color,
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      interaction: { intersect: false, mode: 'index' },
      plugins: { legend: { display: false } },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'day', displayFormats: { day: 'MM/dd' } },
          grid: { color: '#e2e8f0' },
          ticks: { maxTicksLimit: 6 },
        },
        y: {
          grid: { color: '#e2e8f0' },
          ticks: { callback: v => v + ' kg' },
          beginAtZero: false,
        }
      }
    }
  });
}

// Stats
function renderStats() {
  const sessions = [...new Set(LOG.map(r => r[0]))].length;
  const squat  = Math.max(...LOG.filter(r=>r[1]==='高背槓深蹲').map(r=>r[2]));
  const dl     = Math.max(...LOG.filter(r=>r[1]==='相撲硬舉T&G').map(r=>r[2]));
  const press  = Math.max(...LOG.filter(r=>r[1]==='單邊啞鈴臥推').map(r=>r[2]));
  const dates  = LOG.map(r=>r[0]).sort();
  const weeks  = Math.ceil((new Date(dates[dates.length-1]) - new Date(dates[0])) / 86400000 / 7);

  const cards = [
    { label: '訓練天數', value: sessions, unit: '天', color: '#4a86e8' },
    { label: '深蹲最高', value: squat,   unit: 'kg', color: '#4a86e8' },
    { label: '硬舉最高', value: dl,      unit: 'kg', color: '#e06666' },
    { label: '臥推最高', value: press,   unit: 'kg', color: '#6aa84f' },
    { label: '訓練週數', value: weeks,   unit: '週', color: '#e69138' },
  ];

  document.getElementById('stats').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="label">${c.label}</div>
      <div class="value" style="color:${c.color}">${c.value}<span class="unit">${c.unit}</span></div>
    </div>
  `).join('');
}

// Charts
function renderCharts() {
  const grid = document.getElementById('charts-grid');
  grid.innerHTML = EXERCISES.map((ex, i) => {
    const pts = getExerciseData(ex.key);
    const max = pts.length ? Math.max(...pts.map(p=>p.y)) : 0;
    const latest = pts.length ? pts[pts.length-1].y : 0;
    return `
      <div class="chart-card">
        <div class="chart-title" style="color:${ex.color}">${ex.label}</div>
        <div class="chart-sub">最高 ${max} kg　最近 ${latest} kg</div>
        <canvas id="chart-${i}"></canvas>
      </div>
    `;
  }).join('');

  EXERCISES.forEach((ex, i) => buildChart(`chart-${i}`, ex));
}

// Recent log table (last 20 weighted rows, newest first)
function renderTable() {
  const rows = [...LOG]
    .filter(r => r[2] > 0)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .slice(0, 20);

  document.getElementById('log-tbody').innerHTML = rows.map(r => {
    const ex = EXERCISES.find(e => e.key === r[1]);
    const color = ex ? ex.color : '#718096';
    return `
      <tr>
        <td>${r[0]}</td>
        <td><span class="badge" style="background:${color}22;color:${color}">${r[1]}</span></td>
        <td><strong>${r[2]}</strong> kg</td>
        <td>${r[3]}</td>
        <td>${r[4]}</td>
        <td>${r[5]} kg</td>
        <td style="color:#718096;font-size:0.78rem">${r[6]}</td>
      </tr>
    `;
  }).join('');
}

document.getElementById('last-updated').textContent = new Date().toLocaleDateString('zh-TW');
renderStats();
renderCharts();
renderTable();
</script>
</body>
</html>
